context:
  stack: typescript, electron, react, zustand, tailwind, fastify
  description: >
    Aplikacja desktopowa do zarządzania zadaniami — limit 5 aktywnych projektów.
    Używana lokalnie przez jednego użytkownika, nie jest wystawiona publicznie.
  structure: |
    src/main/       — proces główny Electron (IPC handlery w store.ts, service layer w service/)
    src/preload/    — bridge IPC (index.ts)
    src/renderer/   — React UI (komponenty, hooki, Zustand store)
    src/shared/     — typy i logika współdzielona (types.ts, schedule.ts)
    data.yaml       — dane projektów/tasków (iCloud sync)
    checkins.jsonl  — dziennik check-inów
  testing: |
    npm run test       — unit testy schedule (tsc + node --test)
    npm run test:api   — testy HTTP API (vitest, 66 testów, mock Electron)
  security: |
    HTTP API tylko na 127.0.0.1 z Bearer token auth.
    Podatności wymagające dostępu sieciowego lub reverse proxy nie stanowią zagrożenia.
  notes: |
    Solo project, local-first. Sandbox Electron wyłączony (nie zmieniać).
    Build wymaga clean przed electron-vite build (stale .js artefakty z tsc).
    Deploy: ./build.sh (instalacja lokalna).

actions:
  - name: commit
    cmd: "/c.commit --version"
    pane: 1
    type: claude

  - name: push
    cmd: "git push origin $(git branch --show-current)"
    pane: 3

  - name: deploy (install)
    cmd: "./build.sh"
    pane: 3

  - name: dev
    cmd: "npm run dev"
    pane: 3

  - name: build
    cmd: "npm run build"
    pane: 3

  - name: typecheck
    cmd: "npm run typecheck"
    pane: 3

  - name: test
    cmd: "npm run test"
    pane: 3

  - name: test-api
    cmd: "npm run test:api"
    pane: 3

  - name: clean
    cmd: "npm run clean"
    pane: 3
